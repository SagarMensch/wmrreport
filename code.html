<style>

        body {
            background-color: #0A0908;
            color: #F5EBE1;
            margin: 0;
            overflow-x: hidden;
            /* Subtle grain texture overlay */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");

        /* The Spotlight Effect */
        .spotlight-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at 50% 30%, rgba(212, 175, 55, 0.15) 0%, rgba(10, 9, 8, 0.8) 50%, #0A0908 100%);
            z-index: 10;
        }

        /* Scroll Indicator Pulse Animation */
        @keyframes pulse-line {
            0%, 100% { opacity: 0.2; height: 40px; }
            50% { opacity: 1; height: 80px; }
        }
        
        .scroll-line {
            animation: pulse-line 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* Engraved Text Shadow */
        .engraved-text {
            text-shadow: 2px 4px 10px rgba(0,0,0,0.8), -1px -1px 0 rgba(255,255,255,0.1);
